# RED corpus -- statements that MUST be blocked under policies/default.yaml.
# Each `expect` is a reason code that must appear in the rejection. False
# negatives here (a red query allowed) must be ~zero (CLAUDE.md sec. 8 Day 8).

- sql: "DELETE FROM rental"
  why: "bare DELETE, no WHERE -- would wipe the table"
  expect: WRITE_WITHOUT_WHERE

- sql: "UPDATE film SET rental_rate = 0"
  why: "bare UPDATE, no WHERE -- rewrites every row"
  expect: WRITE_WITHOUT_WHERE

- sql: "UPDATE customer SET activebool = false"
  why: "bare UPDATE on an allowed table is still unbounded"
  expect: WRITE_WITHOUT_WHERE

- sql: "DROP TABLE film"
  why: "DDL is default-deny"
  expect: DDL_NOT_ALLOWED

- sql: "TRUNCATE rental"
  why: "TRUNCATE is unrecoverable bulk delete; default-deny DDL"
  expect: DDL_NOT_ALLOWED

- sql: "ALTER TABLE film ADD COLUMN sneaky int"
  why: "schema change, default-deny DDL"
  expect: DDL_NOT_ALLOWED

- sql: "ALTER SYSTEM SET work_mem = '64MB'"
  why: "server-config change classified as DDL-severity"
  expect: DDL_NOT_ALLOWED

- sql: "COPY film TO PROGRAM 'id'"
  why: "shell-out via COPY PROGRAM; fail-closed DDL bucket"
  expect: DDL_NOT_ALLOWED

- sql: "DO $$ BEGIN DELETE FROM rental; END $$"
  why: "procedural body we can't parse; fail-closed DDL"
  expect: DDL_NOT_ALLOWED

- sql: "SELECT * FROM pg_catalog.pg_tables"
  why: "system catalog access"
  expect: SYSTEM_CATALOG_ACCESS

- sql: "SELECT relname FROM pg_class"
  why: "unqualified system catalog"
  expect: SYSTEM_CATALOG_ACCESS

- sql: "SELECT table_name FROM information_schema.tables"
  why: "information_schema access"
  expect: SYSTEM_CATALOG_ACCESS

- sql: "SELECT * FROM secret_accounts"
  why: "table not on the allowlist (default-deny)"
  expect: TABLE_NOT_ALLOWED

- sql: "SELECT f.title FROM film f JOIN secret_accounts s ON true"
  why: "one disallowed table in a join is enough to block"
  expect: TABLE_NOT_ALLOWED

- sql: "SELECT 1; DROP TABLE film"
  why: "sneaky second statement smuggled in a batch"
  expect: MULTI_STATEMENT

- sql: "WITH d AS (DELETE FROM rental RETURNING *) SELECT * FROM d"
  why: "data-modifying CTE: a delete-all hidden under a SELECT"
  expect: WRITE_WITHOUT_WHERE

- sql: "SELECT password FROM staff WHERE staff_id = 1"
  why: "explicit reference to a sensitive blocked column"
  expect: COLUMN_BLOCKED

- sql: "SELECT * FROM staff WHERE staff_id = 1"
  why: "star select over a table with a restricted column (staff.password)"
  expect: COLUMN_BLOCKED

- sql: "SELECT staff.* FROM staff WHERE staff_id = 1"
  why: "qualified star over a sensitive table still leaks restricted columns"
  expect: COLUMN_BLOCKED

- sql: "SELECT * FROM film WHERE film_id = 1 FOR UPDATE"
  why: "FOR UPDATE takes row locks -- not a safe read"
  expect: LOCKING_NOT_ALLOWED

- sql: "SELECT pg_sleep(60)"
  why: "pg_sleep ties up a connection; unsafe function"
  expect: FUNCTION_NOT_ALLOWED

- sql: "SELECT lo_import('/etc/passwd')"
  why: "large-object import reaches the filesystem; unsafe function"
  expect: FUNCTION_NOT_ALLOWED

- sql: "SELECT FROM WHERE ;;;"
  why: "unparseable -> fail closed"
  expect: UNPARSEABLE

# --- Evasion variants: same dangers wearing a disguise. Because we classify the
# --- AST (never the raw text), comments / casing / whitespace / quoting can't
# --- sneak anything past. Every one of these MUST still block.

- sql: "/* cleanup */ DELETE FROM rental -- safe, trust me"
  why: "evasion: comments around a bare DELETE -- parser strips them"
  expect: WRITE_WITHOUT_WHERE

- sql: "DELETE FROM rental /* WHERE rental_id = 1 */"
  why: "evasion: the WHERE is commented out -> still a bare DELETE"
  expect: WRITE_WITHOUT_WHERE

- sql: "dRoP tAbLe film"
  why: "evasion: mixed casing -- SQL keywords are case-insensitive"
  expect: DDL_NOT_ALLOWED

- sql: "DELETE\n\tFROM\n   rental"
  why: "evasion: newlines/tabs as whitespace -- still a bare DELETE"
  expect: WRITE_WITHOUT_WHERE

- sql: "SELECT 1; /* hi */ DROP TABLE film;"
  why: "evasion: a second statement smuggled past a comment"
  expect: MULTI_STATEMENT

- sql: "SELECT relname FROM \"pg_catalog\".\"pg_class\""
  why: "evasion: quoted identifiers don't hide system-catalog access"
  expect: SYSTEM_CATALOG_ACCESS

- sql: "SELECT PG_SLEEP(60)"
  why: "evasion: upper-cased function name -- match is case-insensitive"
  expect: FUNCTION_NOT_ALLOWED

- sql: "SELECT * FROM public.secret_accounts WHERE id = 1"
  why: "evasion: schema-qualifying a disallowed table doesn't allow it"
  expect: TABLE_NOT_ALLOWED

- sql: "WITH d AS (DELETE FROM rental RETURNING *) SELECT count(*) FROM d"
  why: "evasion: a delete-all hidden in a data-modifying CTE under a SELECT"
  expect: WRITE_WITHOUT_WHERE

- sql: "DO $$ BEGIN DELETE FROM rental; END $$"
  why: "evasion: dangerous logic hidden in an unparseable procedural body"
  expect: DDL_NOT_ALLOWED

# --- QA-found leaks (Day 8 review): alias/whole-row column projections and
# --- writes wrapped in EXPLAIN ANALYZE. Permanent regressions.

- sql: "SELECT s.* FROM staff s WHERE staff_id = 1"
  why: "alias star -- s.* resolves to staff.* and leaks staff.password"
  expect: COLUMN_BLOCKED

- sql: "SELECT row_to_json(s) FROM staff s WHERE staff_id = 1"
  why: "whole-row projection of staff via row_to_json leaks all columns"
  expect: COLUMN_BLOCKED

- sql: "SELECT s FROM staff s WHERE staff_id = 1"
  why: "bare alias is a whole-row reference to staff"
  expect: COLUMN_BLOCKED

- sql: "EXPLAIN ANALYZE DELETE FROM rental WHERE rental_id = 1"
  why: "EXPLAIN ANALYZE actually EXECUTES the wrapped DELETE"
  expect: WRAPPED_WRITE

- sql: "EXPLAIN ANALYZE UPDATE film SET rental_rate = 1 WHERE film_id = 1"
  why: "EXPLAIN ANALYZE executes the wrapped UPDATE"
  expect: WRAPPED_WRITE

# The semicolon footgun (SQL-dev reported): a stray ';' turns one intended
# scoped write into a full-table write. Must always block -- never preview as
# a safe point operation.
- sql: "DELETE FROM rental; WHERE rental_id = 9"
  why: "mid-statement semicolon: 'WHERE rental_id = 9' is a stray fragment, so the parser sees a bare full-table DELETE plus garbage"
  expect: UNPARSEABLE

- sql: "DELETE FROM rental; DELETE FROM payment WHERE payment_id = 1"
  why: "semicolon smuggles a second statement; the first is an unbounded full-table DELETE"
  expect: MULTI_STATEMENT
